services:
  - type: web
    name: woli-growth-ai-api
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate --schema=apps/api/prisma/schema.prisma && npm run build --workspace=apps/api
    startCommand: node apps/api/dist/server.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: WOLI_AI_API_URL
        value: https://api-ia.woli.com.br
      - key: WOLI_AI_TOKEN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 3000
      - key: FRONTEND_URL
        sync: false
      - key: NODE_ENV
        value: production
